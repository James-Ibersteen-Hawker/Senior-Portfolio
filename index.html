<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Back to the Portfolio</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <div class="hero">
      <div class="bus"></div>
      <div class="center">
        <h2 class="top">REMY SERBINENKO></h2>
        <h2 class="bottom">WEB DESIGNER<</h2>
      </div>
    </div>
    <footer class="footer" id="vue_app">
      <time-machine></time-machine>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="text/x-template" id="time_machine_template">
      <!--template-->
      <div id="time_machine">
        <circuit :section="-1" :mm="9" :dd="7" :yyyy="2023" :hr="8" :min="24"></circuit>
        <div class="speedometer" @mouseenter="up" @mouseleave="stop" :class="{'off': !active}">
          <div class="buttons">
            to
          </div>
        <a href="./projects.html" target="_self">
          <div class="intothebutton">
            <span>{{speed}}.&nbsp;</span>
          </div>
        </a>
      </div>
        <circuit :section="1" :mm="today[1]" :dd="today[0]" :yyyy="today[2]" :hr="today[3]" :min="today[4]"></circuit>
      </div>
      <!--template-->
    </script>
    <script type="module" src="script.js"></script>
  </body>
</html>
