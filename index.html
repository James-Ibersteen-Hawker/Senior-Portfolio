<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Back to the Portfolio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <script
      defer
      src="https://unpkg.com/vue@3.0.11/dist/vue.global.prod.js"
    ></script>
  </head>

  <body>
    <main id="vue_app" class="portfolio_page">
      <time-machine></time-machine>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="script.js"></script>
    <script type="module" src="components.js"></script>
    <script type="text/x-template" id="time_machine_template">
      <!--template-->
      <div id="time_machine">
        <circuit></circuit>
        <circuit></circuit>
        <circuit></circuit>
      </div>
      <!--template-->
    </script>
    <script type="text/x-template" id="circuit_template">
            <div class="circuit">
              <div class="boxes">
                <div id="month" class="box" style="--name: 'month'">{{mm}}</div>
                <div id="day" class="box" style="--name: 'day'">{{dd}}</div>
                <div id="year" class="box" style="--name: 'year'">{{yyyy}}</div>
                <div class="ampm">
                  <div class="am" style="--label: 'am'"></div>
                  <div class="pm on" style="--label: 'pm'"></div>
                </div>
                <div id="hour" class="box" style="--name: 'hour'">{{hr}}</div>
                <div class="dots"></div>
                <div id="min" class="box" style="--name: 'min'">{{min}}</div>
              </div>
              <div class="label">
                {{name}}
              </div>
            </div>
    </script>
  </body>
</html>
