<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Back to the Portfolio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <script
      defer
      src="https://unpkg.com/vue@3.0.11/dist/vue.global.prod.js"
    ></script>
  </head>

  <body>
    <main id="vue_app" class="portfolio_page">
      <div class="header">PROJECTS<</div>
      <div class="machine">
        <!-- <time-machine></time-machine> -->
      </div>
      <div class="control">control</div>
      <div class="projects">
        <div class="skewed">
          <project
            v-for="item in data.json"
            :name="item.name"
            :link="item.link"
            description="lorem ipsum"
            loading="lazy"></project>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="text/x-template" id="time_machine_template">
      <!--template-->
      <div id="time_machine">
        <circuit :section="1" :mm="5" :dd="12" :yyyy="2026" :hr="31" :min="24"></circuit>
        <circuit :section="0" :mm="5" :dd="12" :yyyy="2026" :hr="31" :min="24"></circuit>
        <circuit :section="-1" :mm="5" :dd="12" :yyyy="2026" :hr="31" :min="24"></circuit>
      </div>
      <!--template-->
    </script>
    <script type="text/x-template" id="project_item">
      <div class="project">
        <div class="iframe">
          <a :href="link" target="_blank">
            <iframe :src="link" :title="name"></iframe>
          </a>
        </div>
        <div class="about">
          <h2 class="title">{{name}}</h2>
          <div class="description">{{description}}</div>
        </div>
      </div>
    </script>
    <script type="module" src="script.js"></script>
  </body>
</html>
