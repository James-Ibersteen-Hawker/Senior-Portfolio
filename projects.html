<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Back to the Portfolio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <script
      defer
      src="https://unpkg.com/vue@3.0.11/dist/vue.global.prod.js"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <main id="vue_app" class="portfolio_page">
      <div class="header">PROJECTS<</div>
      <div class="machine">
        <!-- <time-machine></time-machine> -->
      </div>
      <!-- <div class="timeMachineOverlay">
        <time-machine></time-machine>
      </div> -->
      <div class="control">control</div>
      <div class="projects">
        <div class="skewed">
          <project
            v-for="item in data.json"
            :name="item.name"
            :link="item.link"
            :description="item.description"
            :time="item.creationdate"
            loading="lazy"
          ></project>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="text/x-template" id="time_machine_template">
      <!--template-->
      <div id="time_machine">
        <circuit :section="now[0]" :mm="now[1]" :dd="now[2]" :yyyy="now[3]" :hr="now[4]" :min="now[5]"></circuit>
        <circuit :section="then[0]" :mm="5" :dd="12" :yyyy="2026" :hr="31" :min="24"></circuit>
        <circuit :section="was[0]" :mm="5" :dd="12" :yyyy="2026" :hr="31" :min="24"></circuit>
      </div>
      <!--template-->
    </script>
    <script type="text/x-template" id="project_item">
      <div class="project">
        <div class="time">
          <div class="month display">
            <span :style="{'--value': mm}">888</span>
          </div>
          <div class="day display">
            <span :style="{'--value': dd}">88</span>
          </div>
          <div class="year display">
            <span :style="{'--value': yyyy}">8888</span>
          </div>
        </div>
          <a :href="link || '404.html'" target="_blank">
            <div class="iframe">
              <iframe :src="link || '404.html'" :title="name" width="400px" height="100%"
                sandbox="allow-scripts allow-same-origin">></iframe>
            </div>
          </a>
        <div class="about">
          <h2 class="title">{{name}}</h2>
          <div class="description">{{description}}</div>
        </div>
      </div>
    </script>
    <script type="module" src="script.js"></script>
  </body>
</html>
